box: centos/stream9
providers:
  - type: libvirt
    cpus: 2
    memory: 2048
nodes:
  master:
    networks:
      - type: forwarded_port
        host: 6443
        guest: 6443
    provisioners:
      - type: shell
        inline: |
          sudo swapoff -a
          sudo sed -i -r '/^[^#].+\s+swap\s+/ s/^/# /' /etc/fstab
      - type: k3s
      - type: docker

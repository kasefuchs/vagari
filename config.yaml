nodes:
  master:
    box: centos/stream9
    provider:
      kind: libvirt
      cpus: 2
      memory: 2048
    networks:
      - kind: forwarded_port
        host: 6443
        guest: 6443
    provisioners:
      - kind: shell
        inline: |
          sudo swapoff -a
          sudo sed -i -r '/^[^#].+\s+swap\s+/ s/^/# /' /etc/fstab
      - kind: k3s
      - kind: docker
